<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>Marathi Sentence Detector</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 30px;
        }
        textarea {
            width: 100%;
            height: 150px;
            font-size: 16px;
            padding: 10px;
        }
        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 16px;
        }
        .box {
            background: #fff;
            padding: 15px;
            margin-top: 12px;
            border-left: 6px solid #333;
        }
        .ai {
            border-color: red;
        }
        .human {
            border-color: green;
        }
    </style>
</head>
<body>

<h2>Marathi AI vs Human – Sentence Wise Detection</h2>

<form method="post">
    <textarea name="paragraph" placeholder="मराठी परिच्छेद टाका...">{{ paragraph }}</textarea>
    <br>
    <button type="submit">Detect</button>
</form>

{% for r in results %}
<div class="box {% if r.writer == 'AI Written' %}ai{% else %}human{% endif %}">
    <strong>Sentence:</strong> {{ r.sentence }} <br>
    <strong>Written By:</strong> {{ r.writer }} <br>
    <strong>AI Probability:</strong> {{ r.probability }}
</div>
{% endfor %}

</body>
</html>
